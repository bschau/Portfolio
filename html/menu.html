<!DOCTYPE html>
<html dir="ltr" lang="en">
<head>
	<meta http-equiv="Content-Type" content="text/html; charset=UTF-8">
	<meta name="viewport" content="width=device-width">
	<title>Brian Schau</title>
	<link rel="shortcut icon" href="/favicon.ico" type="image/x-icon">
	<link rel="icon" href="/favicon.ico" type="image/x-icon">
	<link href="https://fonts.googleapis.com/css?family=Cute+Font&display=swap" rel="stylesheet">
	<style>
html, body {
	overflow: hidden;
	margin: 0;
	padding: 0;
	width: 100%;
	height: 100%;
	font-family: 'Cute Font', cursive;
	background-color: black;
}

/** menu */
#menu-wrapper {
	position: absolute;
	top: 20%;
	left: 20%;
	color: white;
	z-index: 1000;
	margin: 0 auto;
	width: 60%;
}

.menu-items {
	font-size: 44px;
	text-align: center;
	margin: 0 auto;
	width: 40%;
}

a.menu, a.menu:visited, a.menu:hover, a.menu:active {
	background: linear-gradient(to bottom, #aae 0%, #aae 100%);
	background-position: 0 100%;
	background-repeat: repeat-x;
	text-decoration: none;
	transition: background-size .2s;
	background-size: 4px 4px;
	color: #aae;
}

a.menu:hover {
	color: #fff;
	background-size: 4px 50px;
}
	</style>
</head>
<body>
	<div id="main">
		<div id="menu-wrapper">
			<div class="menu-items">
				<a href="#" class="menu">&nbsp;Item 1&nbsp;</a><br />
				<a href="#" class="menu">&nbsp;Another Item&nbsp;</a><br />
				<a href="#" class="menu">&nbsp;Yet Another&nbsp;</a><br />
				<a href="#" class="menu">&nbsp;Last&nbsp;</a><br />
			</div>
		</div>
	</div>
</body>
</html>
